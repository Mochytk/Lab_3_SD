version: '3.8'

services:
  # VM 1 (dist001)
  broker:
    build: .
    container_name: distrieats-broker
    environment:
      - CSV_FILE=${CSV_FILE:-pedidos.csv}
    command: ["sh", "-c", "./broker --port=50050 --datanodes=dist002:50051,dist003:50052,dist004:50053 --csv=$$CSV_FILE"]
    ports:
      - "50050:50050"

  # VM 2 (dist002)
  gateway:
    build: .
    container_name: distrieats-gateway
    command: ["./gateway", "--port=50040", "--broker=dist001:50050", "--datanodes=dist002:50051,dist003:50052,dist004:50053"]
    ports:
      - "50040:50040"

  datanode1:
    build: .
    container_name: distrieats-datanode1
    command: ["./datanode", "--id=DN1", "--port=50051", "--peers=dist003:50052,dist004:50053"]
    ports:
      - "50051:50051"

  cliente1:
    build: .
    container_name: distrieats-cliente1
    command: ["./client", "--gateway=dist002:50040", "--client=Cliente-1", "--pedido=Ped-001"]

  # VM 3 (dist003)
  datanode2:
    build: .
    container_name: distrieats-datanode2
    command: ["./datanode", "--id=DN2", "--port=50052", "--peers=dist002:50051,dist004:50053"]
    ports:
      - "50052:50052"

  cliente2:
    build: .
    container_name: distrieats-cliente2
    command: ["./client", "--gateway=dist002:50040", "--client=Cliente-2", "--pedido=Ped-002"]

  # VM 4 (dist004)
  datanode3:
    build: .
    container_name: distrieats-datanode3
    command: ["./datanode", "--id=DN3", "--port=50053", "--peers=dist002:50051,dist003:50052"]
    ports:
      - "50053:50053"

  cliente3:
    build: .
    container_name: distrieats-cliente3
    command: ["./client", "--gateway=dist002:50040", "--client=Cliente-3", "--pedido=Ped-003"]
